[honeypot]
# Simulate a hospital bedside vitals monitor hostname
hostname = ICU-MONITOR-04
domainname = internal.hospital.local

[ssh]
# Force the SSH banner to report as an embedded Dropbear server
version_string = SSH-2.0-dropbear_2020.81
listen_endpoints = tcp:2222:interface=0.0.0.0

[telnet]
# Turn on Telnet (commonly left open on older hospital hardware)
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0
