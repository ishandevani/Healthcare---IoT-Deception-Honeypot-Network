# ============================================================================
# Cowrie Honeypot - Medical IoT Device Configuration
# Simulates: GE CMS7000 Patient Monitor (ICU Bedside Unit)
# ============================================================================

[honeypot]

# Sensor name for logging identification
sensor_name = ICU-MONITOR-04

# Hostname shown in shell prompt - mimics a GE patient monitor
hostname = ICU-MONITOR-04

# Domain to make it look like internal hospital network
# prompt will show: root@ICU-MONITOR-04:~#

# Log file directory
log_path = var/log/cowrie

# Downloaded malware/artifacts storage
download_path = ${honeypot:state_path}/downloads

# State files directory
state_path = var/lib/cowrie

# Config files directory
etc_path = etc

# TTY logging - records full terminal session of attacker
ttylog = true
ttylog_path = ${honeypot:state_path}/tty

# Keep attacker sessions alive longer to capture more behavior
idle_timeout = 300
authentication_timeout = 120

# Use shell backend (simulated Linux shell)
backend = shell

# Rotating logs - easier to analyze by date
logtype = rotating

timezone = UTC

# Custom shell prompt to look like embedded medical device
prompt = root@ICU-MONITOR-04:~#


# ============================================================================
# SSH Configuration - Mimics embedded Dropbear SSH on medical device
# ============================================================================

[ssh]

# Dropbear is commonly used on embedded/IoT medical devices
# This makes the SSH banner look like a real embedded device
version_string = SSH-2.0-dropbear_2020.81

# Listen on port 2222 (mapped to 22 externally)
listen_endpoints = tcp:2222:interface=0.0.0.0

# RSA and DSA keys for the fake device
rsa_public_key = var/lib/cowrie/ssh_host_rsa_key.pub
rsa_private_key = var/lib/cowrie/ssh_host_rsa_key
dsa_public_key = var/lib/cowrie/ssh_host_dsa_key.pub
dsa_private_key = var/lib/cowrie/ssh_host_dsa_key


# ============================================================================
# Telnet Configuration
# Real IoT medical devices commonly leave Telnet open (bad practice = realistic)
# ============================================================================

[telnet]

# Enable Telnet - very common on old hospital hardware
enabled = true

# Listen on port 2223 (mapped to 23 externally)
listen_endpoints = tcp:2223:interface=0.0.0.0


# ============================================================================
# Authentication - Use default IoT credentials attackers will try
# ============================================================================

# UserDB reads credentials from etc/userdb.txt
# We will add common medical device default passwords there
auth_class = UserDB


# ============================================================================
# Shell Simulation - Fake medical device filesystem and processes
# ============================================================================

[shell]

# Arch of a typical ARM-based embedded medical device
# Most bedside monitors run on ARM processors
arch = linux-arm-lsb

# Custom process list - will look like a real patient monitor
# processes = var/lib/cowrie/cmdoutput.json


# ============================================================================
# Output Modules - What gets logged and where
# ============================================================================

# JSON log output - main log for Python parsing in Week 3
[output_jsonlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.json
epoch_timestamp = false

# Text log output - human readable
[output_textlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.log

# Virus Total - check uploaded malware hashes automatically
[output_virustotal]
enabled = false
api_key = YOUR_VT_API_KEY_HERE
upload = false
debug = false

# All other outputs disabled for now
[output_mysql]
enabled = false

[output_mongodb]
enabled = false

[output_splunk]
enabled = false

[output_slack]
enabled = false

[output_crashreporter]
enabled = false
debug = false